<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>房源資訊</title>
  <script src="https://cdn.jsdelivr.net/npm/marked@15/marked.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans TC", sans-serif;
      background: #f5f5f5;
      color: #333;
      line-height: 1.6;
      padding-bottom: 0;
    }

    .container {
      max-width: 480px;
      margin: 0 auto;
      padding: 16px;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      overflow: hidden;
      margin-bottom: 16px;
    }

    .card-body {
      padding: 20px;
    }

    /* Summary block */
    .summary {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .summary-item {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 8px 0;
      border-bottom: 1px solid #f0f0f0;
    }

    .summary-item:last-child {
      border-bottom: none;
    }

    .summary-label {
      font-size: 14px;
      color: #888;
      flex-shrink: 0;
    }

    .summary-value {
      font-size: 16px;
      font-weight: 600;
      text-align: right;
    }

    .rent-value {
      color: #e74c3c;
      font-size: 20px;
    }

    /* Discount notice */
    .discount-notice {
      background: #fff8e1;
      border-left: 4px solid #ffc107;
      padding: 12px 16px;
      border-radius: 0 8px 8px 0;
      margin: 16px 0;
      font-size: 14px;
      color: #795548;
    }

    /* Detail section */
    .detail-section {
      padding: 20px;
    }

    .detail-item {
      margin-bottom: 16px;
    }

    .detail-label {
      font-size: 12px;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }

    .detail-value {
      font-size: 15px;
      color: #333;
    }

    /* Error state */
    .error-container {
      display: none;
      text-align: center;
      padding: 60px 20px;
    }

    .error-container.visible {
      display: block;
    }

    .error-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }

    .error-title {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 8px;
      color: #333;
    }

    .error-message {
      font-size: 14px;
      color: #888;
    }

    /* Loading state */
    .loading-container {
      text-align: center;
      padding: 60px 20px;
    }

    .loading-container.hidden {
      display: none;
    }

    .loading-spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #f0f0f0;
      border-top-color: #333;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Property content (hidden until loaded) */
    .property-content {
      display: none;
    }

    .property-content.visible {
      display: block;
    }

    /* Sticky footer */
    .sticky-footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #fff;
      border-top: 1px solid #e0e0e0;
      padding: 12px 16px;
      display: none;
      gap: 12px;
      z-index: 100;
    }

    .sticky-footer.visible {
      display: flex;
    }

    body:has(.sticky-footer.visible) {
      padding-bottom: 80px;
    }

    .cta-button {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 16px;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      text-decoration: none;
      color: #fff;
      min-height: 48px;
      white-space: nowrap;  /* Prevent text wrapping */
    }

    /* Responsive for small screens */
    @media (max-width: 400px) {
      .cta-button {
        padding: 14px 8px;  /* Reduce horizontal padding */
        font-size: 14px;     /* Slightly smaller font */
        gap: 4px;            /* Reduce gap between icon and text */
      }
      
      .cta-icon {
        width: 20px;         /* Slightly smaller icons */
        height: 20px;
      }
    }

    .cta-line {
      background: #06c755;
    }

    .cta-whatsapp {
      background: #25d366;
    }

    .cta-wechat {
      background: #07c160;
    }

    .cta-wechat:hover {
      background: #06a050;
    }

    .cta-wechat:active {
      opacity: 0.85;
    }

    .cta-button:active {
      opacity: 0.85;
    }

    .cta-icon {
      width: 22px;
      height: 22px;
    }

    /* Photo carousel */
    .carousel {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #e0e0e0;
      overflow: hidden;
    }

    .carousel-track {
      display: flex;
      height: 100%;
      transition: transform 0.3s ease;
    }

    .carousel-slide {
      min-width: 100%;
      height: 100%;
    }

    .carousel-slide img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .carousel-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(0, 0, 0, 0.4);
      color: #fff;
      border: none;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2;
    }

    .carousel-btn:active {
      background: rgba(0, 0, 0, 0.6);
    }

    .carousel-prev { left: 8px; }
    .carousel-next { right: 8px; }

    .carousel-dots {
      position: absolute;
      bottom: 10px;
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      gap: 6px;
      z-index: 2;
    }

    .carousel-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.5);
      border: none;
      padding: 0;
      cursor: pointer;
    }

    .carousel-dot.active {
      background: #fff;
    }

    .carousel-empty {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #aaa;
      font-size: 14px;
    }

    .carousel-slide-video {
      position: relative;
      cursor: pointer;
    }

    .carousel-slide-video img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .carousel-play-btn {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.85);
      border: none;
      font-size: 24px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
    }

    .carousel-play-btn:active {
      background: rgba(255, 255, 255, 1);
    }

    .carousel-slide iframe {
      width: 100%;
      height: 100%;
      border: 0;
      background: #000;
    }

    .carousel-slide.playing {
      cursor: default;
    }

    /* Equipment checklist */
    .equipment-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .equipment-tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: #f0f7ff;
      color: #1a73e8;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 13px;
    }

    .equipment-icon {
      font-size: 16px;
    }

    /* Language toggle */
    .lang-header {
      display: flex;
      justify-content: flex-end;
      padding: 8px 0;
    }

    .lang-toggle {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 13px;
      color: #555;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .lang-toggle:active {
      background: #f5f5f5;
    }

    /* Listing page */
    .listing-content {
      display: none;
    }

    .listing-content.visible {
      display: block;
    }

    .listing-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0 16px;
    }

    .listing-brand {
      font-size: 20px;
      font-weight: 700;
      color: #333;
    }

    .listing-grid {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .listing-card {
      display: block;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      overflow: hidden;
      text-decoration: none;
      color: inherit;
    }

    .listing-card:active {
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.15);
    }

    .listing-card-thumb {
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #e0e0e0;
      overflow: hidden;
    }

    .listing-card-thumb img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .listing-card-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #bbb;
      font-size: 36px;
    }

    .listing-card-body {
      padding: 14px 16px;
    }

    .listing-card-rent {
      font-size: 18px;
      font-weight: 700;
      color: #e74c3c;
      margin-bottom: 4px;
    }

    .listing-card-meta {
      font-size: 13px;
      color: #888;
      margin-bottom: 4px;
    }

    .listing-card-vacancy {
      font-size: 13px;
      color: #666;
    }

    .listing-empty {
      text-align: center;
      padding: 48px 20px;
    }

    .listing-empty-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }

    .listing-empty-msg {
      font-size: 16px;
      color: #666;
      margin-bottom: 24px;
    }

    .listing-empty-cta {
      display: flex;
      gap: 12px;
      justify-content: center;
    }

    /* Description section */
    .description {
      padding: 16px;
      font-size: 14px;
      line-height: 1.7;
      color: #444;
    }

    .description h1,
    .description h2,
    .description h3 {
      margin: 16px 0 8px 0;
      color: #222;
      line-height: 1.3;
    }

    .description h1 { font-size: 18px; }
    .description h2 { font-size: 16px; }
    .description h3 { font-size: 15px; }

    .description h1:first-child,
    .description h2:first-child,
    .description h3:first-child {
      margin-top: 0;
    }

    .description p {
      margin: 0 0 12px 0;
    }

    .description p:last-child {
      margin-bottom: 0;
    }

    .description ul,
    .description ol {
      margin: 0 0 12px 0;
      padding-left: 20px;
    }

    .description ul { list-style: disc; }

    .description li {
      margin-bottom: 4px;
    }

    .description a {
      color: #2563eb;
      text-decoration: underline;
    }

    .description img {
      max-width: 100%;
      height: auto;
      border-radius: 8px;
    }
  </style>
</head>
<body>

  <!-- Loading -->
  <div class="container">
    <div class="loading-container" id="loading">
      <div class="loading-spinner"></div>
      <div style="color: #888; font-size: 14px;">載入中...</div>
    </div>
  </div>

  <!-- Error -->
  <div class="container">
    <div class="error-container" id="error">
      <div class="error-icon">&#x1F3E0;</div>
      <div class="error-title">找不到此房源</div>
      <div class="error-message">請確認連結是否正確，或聯繫業務取得新連結。</div>
    </div>
  </div>

  <!-- Listing content -->
  <div class="container">
    <div class="listing-content" id="listing">
      <div class="listing-header">
        <span class="listing-brand">Jerry in the house</span>
        <button class="lang-toggle" id="listing-lang-toggle">EN</button>
      </div>
      <div class="listing-grid" id="listing-grid"></div>
      <div class="listing-empty" id="listing-empty" style="display:none;">
        <div class="listing-empty-icon">&#x1F3E0;</div>
        <div class="listing-empty-msg" id="listing-empty-msg"></div>
        <div class="listing-empty-cta">
          <div id="listing-line-btn-container" style="display: none;">
            <a class="cta-button cta-line" id="listing-line-btn" href="#" target="_blank" rel="noopener">

              LINE
            </a>

              WhatsApp
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Property content -->
  <div class="container">
    <div class="property-content" id="property">

      <!-- Language toggle -->
      <div class="lang-header">
        <button class="lang-toggle" id="lang-toggle">EN</button>
      </div>

      <!-- Photo carousel card -->
      <div class="card">
        <div class="carousel" id="carousel">
          <div class="carousel-track" id="carousel-track"></div>
          <button class="carousel-btn carousel-prev" id="carousel-prev">&#8249;</button>
          <button class="carousel-btn carousel-next" id="carousel-next">&#8250;</button>
          <div class="carousel-dots" id="carousel-dots"></div>
        </div>
      </div>

      <!-- Summary card -->
      <div class="card">
        <div class="card-body">
          <div class="summary">
            <div class="summary-item">
              <span class="summary-label" data-i18n="rent_label">月租金</span>
              <span class="summary-value rent-value" id="rent"></span>
            </div>
            <div class="summary-item">
              <span class="summary-label" data-i18n="vacancy_label">空房期間</span>
              <span class="summary-value" id="vacancy"></span>
            </div>
          </div>
        </div>
      </div>

      <!-- Discount notice -->
      <div class="discount-notice" id="discount">
        簽約一年以上享有折扣，幅度面議
      </div>

      <!-- Detail card -->
      <div class="card">
        <div class="detail-section">
          <div class="detail-item">
            <div class="detail-label" data-i18n="address_label">地址</div>
            <div class="detail-value" id="address"></div>
          </div>
          <div class="detail-item">
            <div class="detail-label" data-i18n="size_label">坪數</div>
            <div class="detail-value" id="size"></div>
          </div>
          <div class="detail-item" id="equipment-section" style="display:none;">
            <div class="detail-label" data-i18n="equipment_label">設備</div>
            <div class="equipment-grid" id="equipment"></div>
          </div>
        </div>
      </div>

      <!-- Description -->
      <div class="card" id="description-card" style="display:none;">
        <div class="description" id="description"></div>
      </div>

    </div>
  </div>

  <!-- Sticky footer CTA -->
  <div class="sticky-footer" id="footer">
    <div id="line-btn-container" style="display: none; flex: 1;">
      <a class="cta-button cta-line" id="line-btn" href="#" target="_blank" rel="noopener">

  <script>
    // ===========================================
    // config — agent fills in these values
    // ===========================================
    const config = {
      SHEET_CSV_URL: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSBSLDaVfrnYpC6BerthV3T-cwuGETPsAKZm983sKsThfZUzp4wnz-e8nGkzu3Z7j4opmjODFUEDqL3/pub?gid=168737115&single=true&output=csv',
      LINE_ID: 'my_line_id',  // Replace with your LINE ID
      PHONE_NUMBER: '0912345678', // Replace with your phone number (e.g., 886912345678)
      WECHAT_ID: 'my_wechat_id',  // WeChat ID for Chinese users (empty = not configured)
    };

    // ===========================================
    // Photo URL Transform
    // ===========================================
    function transformPhotoUrl(url) {
      if (!url) return url;
      var match = url.match(/\/file\/d\/([a-zA-Z0-9_-]+)/);
      if (match) {
        return 'https://lh3.googleusercontent.com/d/' + match[1] + '=w1000';
      }
      return url;
    }

    function transformVideoUrl(url) {
      if (!url) return null;
      var match = url.match(/\/file\/d\/([a-zA-Z0-9_-]+)/);
      if (match) {
        return 'https://drive.google.com/file/d/' + match[1] + '/preview';
      }
      return null;
    }

    function getVideoThumbnailUrl(url) {
      if (!url) return null;
      var match = url.match(/\/file\/d\/([a-zA-Z0-9_-]+)/);
      if (match) {
        return 'https://drive.google.com/thumbnail?id=' + match[1] + '&sz=w1000';
      }
      return null;
    }

    // ===========================================
    // Media Helpers
    // ===========================================
    function getMediaItems(row) {
      var items = [];
      for (var i = 1; i <= 8; i++) {
        var url = row['media_' + i];
        if (url) {
          var type = (row['media_' + i + '_type'] || 'photo').trim().toLowerCase();
          items.push({ url: url, type: type });
        }
      }
      return items;
    }

    function getFirstPhoto(row) {
      var items = getMediaItems(row);
      for (var i = 0; i < items.length; i++) {
        if (items[i].type === 'photo') return items[i].url;
      }
      return null;
    }

    // ===========================================
    // CSV Parser
    // ===========================================
    function splitCSVRows(csvText) {
      const rows = [];
      let current = '';
      let inQuotes = false;

      for (let i = 0; i < csvText.length; i++) {
        const char = csvText[i];

        if (inQuotes) {
          if (char === '"') {
            if (i + 1 < csvText.length && csvText[i + 1] === '"') {
              current += '""';
              i++; // skip escaped quote
            } else {
              inQuotes = false;
              current += char;
            }
          } else {
            current += char;
          }
        } else {
          if (char === '"') {
            inQuotes = true;
            current += char;
          } else if (char === '\n') {
            // Skip trailing \r before \n
            if (current.length > 0 && current[current.length - 1] === '\r') {
              current = current.slice(0, -1);
            }
            rows.push(current);
            current = '';
          } else {
            current += char;
          }
        }
      }

      // Push last row if non-empty
      if (current.trim().length > 0) {
        if (current[current.length - 1] === '\r') {
          current = current.slice(0, -1);
        }
        rows.push(current);
      }

      return rows;
    }

    function parseCSV(csvText) {
      const lines = splitCSVRows(csvText.trim());
      if (lines.length < 2) return [];

      const headers = parseCSVLine(lines[0]);
      const rows = [];

      for (let i = 1; i < lines.length; i++) {
        const values = parseCSVLine(lines[i]);
        const row = {};
        headers.forEach((header, index) => {
          row[header.trim()] = (values[index] || '').trim();
        });
        rows.push(row);
      }

      return rows;
    }

    function parseCSVLine(line) {
      const result = [];
      let current = '';
      let inQuotes = false;

      for (let i = 0; i < line.length; i++) {
        const char = line[i];

        if (inQuotes) {
          if (char === '"') {
            if (i + 1 < line.length && line[i + 1] === '"') {
              current += '"';
              i++; // skip escaped quote
            } else {
              inQuotes = false;
            }
          } else {
            current += char;
          }
        } else {
          if (char === '"') {
            inQuotes = true;
          } else if (char === ',') {
            result.push(current);
            current = '';
          } else {
            current += char;
          }
        }
      }

      result.push(current);
      return result;
    }

    // ===========================================
    // Core Functions
    // ===========================================
    function parseQueryParams() {
      const params = new URLSearchParams(window.location.search);
      return {
        id: params.get('id'),
        lang: params.get('lang') || 'zh',
      };
    }

    async function fetchSheetCSV(url) {
      const response = await fetch(url);
      if (!response.ok) {
        throw new Error('Failed to fetch data');
      }
      const csvText = await response.text();
      return parseCSV(csvText);
    }

    function formatRent(rent) {
      const num = parseInt(rent, 10);
      if (isNaN(num)) return rent;
      return 'NT$ ' + num.toLocaleString('en-US') + ' / 月';
    }

    function formatVacancy(start, end) {
      if (!start || !end) return '—';
      return start + ' ~ ' + end;
    }

    // ===========================================
    // i18n
    // ===========================================
    const I18N = {
      zh: {
        title: '房源資訊',
        rent_label: '月租金',
        rent_unit: '/ 月',
        vacancy_label: '空房期間',
        discount: '簽約一年以上享有折扣，幅度面議',
        address_label: '地址',
        size_label: '坪數',
        size_unit: '坪',
        equipment_label: '設備',
        toggle_text: 'EN',
        loading: '載入中...',
        not_found_title: '找不到此房源',
        not_found_msg: '請確認連結是否正確，或聯繫業務取得新連結。',
        no_id_title: '缺少房源編號',
        no_id_msg: '請使用業務提供的完整連結。',
        load_fail_title: '載入失敗',
        load_fail_msg: '請稍後再試，或聯繫業務。',
        photo_alt: '房源照片',
        listing_title: 'Jerry in the house',
        listing_empty: '目前沒有空房，請保持跟我聯絡！',
        listing_vacancy: '空房',
      },
      en: {
        title: 'Property Info',
        rent_label: 'Monthly Rent',
        rent_unit: '/ mo',
        vacancy_label: 'Vacancy',
        discount: 'Lease over 1 year eligible for discount, details negotiable',
        address_label: 'Address',
        size_label: 'Size',
        size_unit: 'm²',
        equipment_label: 'Amenities',
        toggle_text: '中文',
        loading: 'Loading...',
        not_found_title: 'Property Not Found',
        not_found_msg: 'Please check the link or contact the agent.',
        no_id_title: 'Missing Property ID',
        no_id_msg: 'Please use the full link provided by the agent.',
        load_fail_title: 'Failed to Load',
        load_fail_msg: 'Please try again later or contact the agent.',
        photo_alt: 'Property photo',
        listing_title: 'Jerry in the house',
        listing_empty: 'No vacancies at the moment. Stay in touch!',
        listing_vacancy: 'Vacancy',
      },
    };

    let currentLang = 'zh';

    function t(key) {
      return I18N[currentLang][key] || I18N['zh'][key] || key;
    }

    function displaySize(ping) {
      if (!ping) return '—';
      if (currentLang === 'zh') return ping + ' ' + t('size_unit');
      var m2 = (parseFloat(ping) * 3.3).toFixed(1);
      return m2 + ' ' + t('size_unit');
    }

    // ===========================================
    // Equipment labels (extensible)
    // ===========================================
    const EQUIP_LABELS = {
      equip_ac:           { icon: '\u2744\uFE0F', zh: '冷氣', en: 'A/C' },
      equip_washer:       { icon: '\uD83E\uDDFA', zh: '洗衣機', en: 'Washer' },
      equip_fridge:       { icon: '\uD83E\uDDCA', zh: '冰箱', en: 'Fridge' },
      equip_internet:     { icon: '\uD83D\uDCF6', zh: '網路', en: 'Internet' },
      equip_water_heater: { icon: '\uD83D\uDEB0', zh: '熱水器', en: 'Water Heater' },
      equip_desk:         { icon: '\uD83D\uDCDD', zh: '書桌', en: 'Desk' },
      equip_wardrobe:     { icon: '\uD83D\uDEAA', zh: '衣櫃', en: 'Wardrobe' },
    };

    function getEquipLabel(key) {
      const entry = EQUIP_LABELS[key];
      if (entry) return { icon: entry.icon, text: entry[currentLang] || entry.zh };
      // Auto-generate label for unknown equip_* columns
      const name = key.replace('equip_', '').replace(/_/g, ' ');
      return { icon: '\u2705', text: name };
    }

    // ===========================================
    // Media Carousel
    // ===========================================
    function setupPlayHandlers(track) {
      track.addEventListener('click', function(e) {
        var playBtn = e.target.closest('.carousel-play-btn');
        if (!playBtn) return;
        var slide = playBtn.closest('.carousel-slide-video');
        if (!slide || slide.classList.contains('playing')) return;

        var videoSrc = slide.getAttribute('data-video-src');
        if (!videoSrc) return;

        // Replace thumbnail + play button with iframe
        slide.innerHTML = '';
        var iframe = document.createElement('iframe');
        iframe.src = videoSrc;
        iframe.setAttribute('allow', 'autoplay; encrypted-media');
        iframe.setAttribute('allowfullscreen', '');
        slide.appendChild(iframe);
        slide.classList.add('playing');
      });
    }

    function renderCarousel(row) {
      var allItems = getMediaItems(row);

      // Filter to renderable items (photos always; videos only if they have a valid Drive ID)
      var mediaSlides = [];
      for (var i = 0; i < allItems.length; i++) {
        var item = allItems[i];
        if (item.type === 'photo') {
          mediaSlides.push(item);
        } else if (item.type === 'video' && transformVideoUrl(item.url)) {
          mediaSlides.push(item);
        }
      }

      var carousel = document.getElementById('carousel');
      if (mediaSlides.length === 0) {
        carousel.parentElement.style.display = 'none';
        return;
      }

      var track = document.getElementById('carousel-track');
      var dotsContainer = document.getElementById('carousel-dots');

      // Build slides
      mediaSlides.forEach(function(item, i) {
        var slide = document.createElement('div');

        if (item.type === 'photo') {
          slide.className = 'carousel-slide';
          var img = document.createElement('img');
          img.src = transformPhotoUrl(item.url);
          img.alt = '房源照片 ' + (i + 1);
          img.loading = i === 0 ? 'eager' : 'lazy';
          slide.appendChild(img);
        } else {
          // Video slide: thumbnail + play button
          var embedUrl = transformVideoUrl(item.url);
          var thumbUrl = getVideoThumbnailUrl(item.url);
          slide.className = 'carousel-slide carousel-slide-video';
          slide.setAttribute('data-video-src', embedUrl);

          var img = document.createElement('img');
          img.src = thumbUrl;
          img.alt = '房源影片 ' + (i + 1);
          img.loading = i === 0 ? 'eager' : 'lazy';
          slide.appendChild(img);

          var playBtn = document.createElement('button');
          playBtn.className = 'carousel-play-btn';
          playBtn.textContent = '\u25B6';
          playBtn.setAttribute('aria-label', '播放影片');
          slide.appendChild(playBtn);
        }

        track.appendChild(slide);

        var dot = document.createElement('button');
        dot.className = 'carousel-dot' + (i === 0 ? ' active' : '');
        dot.setAttribute('aria-label', (item.type === 'photo' ? '照片' : '影片') + ' ' + (i + 1));
        dotsContainer.appendChild(dot);
      });

      // Hide nav if only 1 item
      if (mediaSlides.length <= 1) {
        document.getElementById('carousel-prev').style.display = 'none';
        document.getElementById('carousel-next').style.display = 'none';
        dotsContainer.style.display = 'none';
        if (mediaSlides.length === 1 && mediaSlides[0].type === 'video') {
          setupPlayHandlers(track);
        }
        return;
      }

      var current = 0;
      var slides = track.querySelectorAll('.carousel-slide');
      var dots = dotsContainer.querySelectorAll('.carousel-dot');

      function stopVideoOnSlide(slideEl) {
        if (slideEl.classList.contains('playing')) {
          var videoSrc = slideEl.getAttribute('data-video-src');
          // Restore thumbnail + play button
          slideEl.innerHTML = '';
          slideEl.classList.remove('playing');

          var img = document.createElement('img');
          var match = videoSrc.match(/\/file\/d\/([a-zA-Z0-9_-]+)/);
          if (match) {
            img.src = 'https://drive.google.com/thumbnail?id=' + match[1] + '&sz=w1000';
          }
          img.alt = '房源影片';
          slideEl.appendChild(img);

          var playBtn = document.createElement('button');
          playBtn.className = 'carousel-play-btn';
          playBtn.textContent = '\u25B6';
          playBtn.setAttribute('aria-label', '播放影片');
          slideEl.appendChild(playBtn);
        }
      }

      function goTo(index) {
        if (index < 0) index = mediaSlides.length - 1;
        if (index >= mediaSlides.length) index = 0;
        // Stop video on current slide before transitioning
        stopVideoOnSlide(slides[current]);
        current = index;
        track.style.transform = 'translateX(-' + (current * 100) + '%)';
        dots.forEach(function(d, i) { d.classList.toggle('active', i === current); });
      }

      document.getElementById('carousel-prev').addEventListener('click', function() { goTo(current - 1); });
      document.getElementById('carousel-next').addEventListener('click', function() { goTo(current + 1); });
      dots.forEach(function(dot, i) { dot.addEventListener('click', function() { goTo(i); }); });

      // Play button handler (delegated)
      setupPlayHandlers(track);

      // Touch swipe support
      var touchStartX = 0;
      var touchEndX = 0;
      carousel.addEventListener('touchstart', function(e) { touchStartX = e.changedTouches[0].screenX; }, { passive: true });
      carousel.addEventListener('touchend', function(e) {
        touchEndX = e.changedTouches[0].screenX;
        var diff = touchStartX - touchEndX;
        if (Math.abs(diff) > 50) {
          goTo(diff > 0 ? current + 1 : current - 1);
        }
      }, { passive: true });
    }

    // ===========================================
    // Equipment Checklist
    // ===========================================
    function renderEquipment(row) {
      const container = document.getElementById('equipment');
      container.innerHTML = '';
      const section = document.getElementById('equipment-section');
      let hasEquipment = false;

      // Scan all equip_* keys
      Object.keys(row).forEach(key => {
        if (!key.startsWith('equip_')) return;
        const val = row[key].toUpperCase();
        if (val !== 'TRUE') return;

        hasEquipment = true;
        const label = getEquipLabel(key);
        const tag = document.createElement('span');
        tag.className = 'equipment-tag';
        tag.innerHTML = '<span class="equipment-icon">' + label.icon + '</span>' + label.text;
        container.appendChild(tag);
      });

      if (hasEquipment) {
        section.style.display = '';
      }
    }

    // ===========================================
    // Listing Page
    // ===========================================
    let currentData = null;

    function filterActiveProperties(data) {
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      return data.filter(row => {
        if (!row.vacancy_end) return false;
        const parts = row.vacancy_end.split('/');
        const endDate = new Date(parts[0], parts[1] - 1, parts[2]);
        return endDate >= today;
      });
    }

    function buildCard(row) {
      const card = document.createElement('a');
      card.className = 'listing-card';
      card.href = '?id=' + encodeURIComponent(row.id) + '&lang=' + currentLang;

      // Thumbnail
      const thumb = document.createElement('div');
      thumb.className = 'listing-card-thumb';
      var firstPhoto = getFirstPhoto(row);
      if (firstPhoto) {
        const img = document.createElement('img');
        img.src = transformPhotoUrl(firstPhoto);
        img.alt = row['district_' + currentLang] || row.district_zh || '';
        img.loading = 'lazy';
        thumb.appendChild(img);
      } else {
        const placeholder = document.createElement('div');
        placeholder.className = 'listing-card-placeholder';
        placeholder.innerHTML = '&#x1F3E0;';
        thumb.appendChild(placeholder);
      }
      card.appendChild(thumb);

      // Body
      const body = document.createElement('div');
      body.className = 'listing-card-body';

      // Rent
      const rent = document.createElement('div');
      rent.className = 'listing-card-rent';
      const rentNum = parseInt(row.rent, 10);
      rent.textContent = isNaN(rentNum) ? row.rent :
        'NT$ ' + rentNum.toLocaleString('en-US') + ' ' + t('rent_unit');
      body.appendChild(rent);

      // District + size
      const meta = document.createElement('div');
      meta.className = 'listing-card-meta';
      const district = row['district_' + currentLang] || row.district_zh || '';
      const size = row.size_ping ? displaySize(row.size_ping) : '';
      meta.textContent = district + (district && size ? '  ·  ' : '') + size;
      body.appendChild(meta);

      // Vacancy
      const vacancy = document.createElement('div');
      vacancy.className = 'listing-card-vacancy';
      vacancy.textContent = t('listing_vacancy') + ' ' + row.vacancy_start + ' ~ ' + row.vacancy_end;
      body.appendChild(vacancy);

      card.appendChild(body);
      return card;
    }

    function renderListing(data) {
      currentData = data;
      const active = filterActiveProperties(data);

      // Update page title and lang
      document.title = t('listing_title');
      document.documentElement.lang = currentLang === 'zh' ? 'zh-Hant' : 'en';

      // Update toggle text
      document.getElementById('listing-lang-toggle').textContent = t('toggle_text');

      const grid = document.getElementById('listing-grid');
      const emptyState = document.getElementById('listing-empty');
      grid.innerHTML = '';

      if (active.length === 0) {
        grid.style.display = 'none';
        emptyState.style.display = '';
        document.getElementById('listing-empty-msg').textContent = t('listing_empty');
        
        // Set CTA links for listing empty state - conditional based on config values
        // Line button
        const listingLineContainer = document.getElementById('listing-line-btn-container');
        const listingLineBtn = document.getElementById('listing-line-btn');
        if (config.LINE_ID) {
          listingLineContainer.style.display = '';
          listingLineBtn.href = 'https://line.me/ti/p/~' + config.LINE_ID;
        } else {
          listingLineContainer.style.display = 'none';
        }
        
        // WeChat button
        const listingWechatContainer = document.getElementById('listing-wechat-btn-container');
        const listingWechatBtn = document.getElementById('listing-wechat-btn');
        if (config.WECHAT_ID) {
          listingWechatContainer.style.display = '';
          listingWechatBtn.href = 'weixin://dl/chat?username=' + config.WECHAT_ID;
        } else {
          listingWechatContainer.style.display = 'none';
        }
        
        // WhatsApp button
        const listingWhatsappContainer = document.getElementById('listing-whatsapp-btn-container');
        const listingWhatsappBtn = document.getElementById('listing-whatsapp-btn');
        if (config.PHONE_NUMBER) {
          listingWhatsappContainer.style.display = '';
          listingWhatsappBtn.href = 'https://wa.me/' + config.PHONE_NUMBER;
        } else {
          listingWhatsappContainer.style.display = 'none';
        }
      } else {
        grid.style.display = '';
        emptyState.style.display = 'none';
        active.forEach(row => {
          grid.appendChild(buildCard(row));
        });
      }

      document.getElementById('listing').classList.add('visible');
    }

    // ===========================================
    // Description
    // ===========================================
    function renderDescription(row) {
      const descKey = 'description_' + currentLang;
      const text = (row[descKey] || row.description_zh || '').trim();
      const card = document.getElementById('description-card');

      if (!text) {
        card.style.display = 'none';
        return;
      }

      document.getElementById('description').innerHTML = marked.parse(text);
      card.style.display = '';
    }

    // ===========================================
    // Render Property
    // ===========================================
    let currentRow = null;
    let carouselRendered = false;

    function renderProperty(row) {
      currentRow = row;

      // Photos (only once — carousel doesn't change with language)
      if (!carouselRendered) {
        renderCarousel(row);
        carouselRendered = true;
      }

      // Update page title
      document.title = t('title');
      document.documentElement.lang = currentLang === 'zh' ? 'zh-Hant' : 'en';

      // Language toggle button text
      document.getElementById('lang-toggle').textContent = t('toggle_text');

      // Summary labels
      document.querySelector('[data-i18n="rent_label"]').textContent = t('rent_label');
      document.querySelector('[data-i18n="vacancy_label"]').textContent = t('vacancy_label');

      // Summary values
      const rentNum = parseInt(row.rent, 10);
      document.getElementById('rent').textContent = isNaN(rentNum) ? row.rent :
        'NT$ ' + rentNum.toLocaleString('en-US') + ' ' + t('rent_unit');
      document.getElementById('vacancy').textContent = formatVacancy(row.vacancy_start, row.vacancy_end);

      // Discount
      document.getElementById('discount').textContent = t('discount');

      // Detail labels
      document.querySelector('[data-i18n="address_label"]').textContent = t('address_label');
      document.querySelector('[data-i18n="size_label"]').textContent = t('size_label');

      // Detail values — pick _zh or _en column
      const addressKey = 'address_' + currentLang;
      document.getElementById('address').textContent = row[addressKey] || row.address_zh || '';
      document.getElementById('size').textContent = displaySize(row.size_ping);

      // Equipment label + re-render tags with current language
      document.querySelector('[data-i18n="equipment_label"]').textContent = t('equipment_label');
      renderEquipment(row);

      // Description
      renderDescription(row);

      // Set CTA links - conditional based on config values
      // Line button
      const lineContainer = document.getElementById('line-btn-container');
      const lineBtn = document.getElementById('line-btn');
      if (config.LINE_ID) {
        lineContainer.style.display = 'flex';
        lineBtn.href = 'https://line.me/ti/p/~' + config.LINE_ID;
      } else {
        lineContainer.style.display = 'none';
      }
      
      // WeChat button
      const wechatContainer = document.getElementById('wechat-btn-container');
      const wechatBtn = document.getElementById('wechat-btn');
      if (config.WECHAT_ID) {
        wechatContainer.style.display = 'flex';
        wechatBtn.href = 'weixin://dl/chat?username=' + config.WECHAT_ID;
      } else {
        wechatContainer.style.display = 'none';
      }
      
      // WhatsApp button
      const whatsappContainer = document.getElementById('whatsapp-btn-container');
      const whatsappBtn = document.getElementById('whatsapp-btn');
      if (config.PHONE_NUMBER) {
        whatsappContainer.style.display = 'flex';
        whatsappBtn.href = 'https://wa.me/' + config.PHONE_NUMBER;
      } else {
        whatsappContainer.style.display = 'none';
      }

      // Show content
      document.getElementById('property').classList.add('visible');
      document.getElementById('footer').classList.add('visible');
    }

    function showError(titleKey, msgKey) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('error').querySelector('.error-title').textContent = t(titleKey);
      document.getElementById('error').querySelector('.error-message').textContent = t(msgKey);
      document.getElementById('error').classList.add('visible');
    }

    function handleNotFound() {
      showError('not_found_title', 'not_found_msg');
    }

    // ===========================================
    // Language Toggle
    // ===========================================
    function switchLanguage() {
      currentLang = currentLang === 'zh' ? 'en' : 'zh';
      // Update URL without reload
      const params = new URLSearchParams(window.location.search);
      params.set('lang', currentLang);
      history.replaceState(null, '', '?' + params.toString());
      // Re-render
      if (currentRow) {
        renderProperty(currentRow);
      } else if (currentData) {
        renderListing(currentData);
      }
    }

    // ===========================================
    // Main
    // ===========================================
    async function main() {
      const { id, lang } = parseQueryParams();
      currentLang = (lang === 'en') ? 'en' : 'zh';

      try {
        const data = await fetchSheetCSV(config.SHEET_CSV_URL);
        document.getElementById('loading').classList.add('hidden');

        if (!id) {
          renderListing(data);
          document.getElementById('listing-lang-toggle').addEventListener('click', switchLanguage);
          return;
        }

        const row = data.find(r => r.id === id);

        if (!row) {
          handleNotFound();
          return;
        }

        renderProperty(row);

        // Bind language toggle after render
        document.getElementById('lang-toggle').addEventListener('click', switchLanguage);
      } catch (err) {
        showError('load_fail_title', 'load_fail_msg');
      }
    }

    main();
  </script>

</body>
</html>
