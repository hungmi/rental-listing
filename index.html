<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>房源資訊</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans TC", sans-serif;
      background: #f5f5f5;
      color: #333;
      line-height: 1.6;
      padding-bottom: 80px; /* space for sticky footer */
    }

    .container {
      max-width: 480px;
      margin: 0 auto;
      padding: 16px;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      overflow: hidden;
      margin-bottom: 16px;
    }

    .card-body {
      padding: 20px;
    }

    /* Summary block */
    .summary {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .summary-item {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 8px 0;
      border-bottom: 1px solid #f0f0f0;
    }

    .summary-item:last-child {
      border-bottom: none;
    }

    .summary-label {
      font-size: 14px;
      color: #888;
      flex-shrink: 0;
    }

    .summary-value {
      font-size: 16px;
      font-weight: 600;
      text-align: right;
    }

    .rent-value {
      color: #e74c3c;
      font-size: 20px;
    }

    /* Discount notice */
    .discount-notice {
      background: #fff8e1;
      border-left: 4px solid #ffc107;
      padding: 12px 16px;
      border-radius: 0 8px 8px 0;
      margin: 16px 0;
      font-size: 14px;
      color: #795548;
    }

    /* Detail section */
    .detail-section {
      padding: 20px;
    }

    .detail-item {
      margin-bottom: 16px;
    }

    .detail-label {
      font-size: 12px;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }

    .detail-value {
      font-size: 15px;
      color: #333;
    }

    /* Error state */
    .error-container {
      display: none;
      text-align: center;
      padding: 60px 20px;
    }

    .error-container.visible {
      display: block;
    }

    .error-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }

    .error-title {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 8px;
      color: #333;
    }

    .error-message {
      font-size: 14px;
      color: #888;
    }

    /* Loading state */
    .loading-container {
      text-align: center;
      padding: 60px 20px;
    }

    .loading-container.hidden {
      display: none;
    }

    .loading-spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #f0f0f0;
      border-top-color: #333;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Property content (hidden until loaded) */
    .property-content {
      display: none;
    }

    .property-content.visible {
      display: block;
    }

    /* Sticky footer */
    .sticky-footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #fff;
      border-top: 1px solid #e0e0e0;
      padding: 12px 16px;
      display: none;
      gap: 12px;
      z-index: 100;
    }

    .sticky-footer.visible {
      display: flex;
    }

    .cta-button {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 16px;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      text-decoration: none;
      color: #fff;
      min-height: 48px;
    }

    .cta-line {
      background: #06c755;
    }

    .cta-whatsapp {
      background: #25d366;
    }

    .cta-button:active {
      opacity: 0.85;
    }

    .cta-icon {
      width: 22px;
      height: 22px;
    }

    /* Photo carousel */
    .carousel {
      position: relative;
      width: 100%;
      aspect-ratio: 4 / 3;
      background: #e0e0e0;
      overflow: hidden;
    }

    .carousel-track {
      display: flex;
      height: 100%;
      transition: transform 0.3s ease;
    }

    .carousel-slide {
      min-width: 100%;
      height: 100%;
    }

    .carousel-slide img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .carousel-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(0, 0, 0, 0.4);
      color: #fff;
      border: none;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2;
    }

    .carousel-btn:active {
      background: rgba(0, 0, 0, 0.6);
    }

    .carousel-prev { left: 8px; }
    .carousel-next { right: 8px; }

    .carousel-dots {
      position: absolute;
      bottom: 10px;
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      gap: 6px;
      z-index: 2;
    }

    .carousel-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.5);
      border: none;
      padding: 0;
      cursor: pointer;
    }

    .carousel-dot.active {
      background: #fff;
    }

    .carousel-empty {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #aaa;
      font-size: 14px;
    }

    /* Equipment checklist */
    .equipment-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .equipment-tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: #f0f7ff;
      color: #1a73e8;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 13px;
    }

    .equipment-icon {
      font-size: 16px;
    }

    /* Language toggle */
    .lang-header {
      display: flex;
      justify-content: flex-end;
      padding: 8px 0;
    }

    .lang-toggle {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 13px;
      color: #555;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .lang-toggle:active {
      background: #f5f5f5;
    }
  </style>
</head>
<body>

  <!-- Loading -->
  <div class="container">
    <div class="loading-container" id="loading">
      <div class="loading-spinner"></div>
      <div style="color: #888; font-size: 14px;">載入中...</div>
    </div>
  </div>

  <!-- Error -->
  <div class="container">
    <div class="error-container" id="error">
      <div class="error-icon">&#x1F3E0;</div>
      <div class="error-title">找不到此房源</div>
      <div class="error-message">請確認連結是否正確，或聯繫業務取得新連結。</div>
    </div>
  </div>

  <!-- Property content -->
  <div class="container">
    <div class="property-content" id="property">

      <!-- Language toggle -->
      <div class="lang-header">
        <button class="lang-toggle" id="lang-toggle">EN</button>
      </div>

      <!-- Photo carousel card -->
      <div class="card">
        <div class="carousel" id="carousel">
          <div class="carousel-track" id="carousel-track"></div>
          <button class="carousel-btn carousel-prev" id="carousel-prev">&#8249;</button>
          <button class="carousel-btn carousel-next" id="carousel-next">&#8250;</button>
          <div class="carousel-dots" id="carousel-dots"></div>
        </div>
      </div>

      <!-- Summary card -->
      <div class="card">
        <div class="card-body">
          <div class="summary">
            <div class="summary-item">
              <span class="summary-label" data-i18n="rent_label">月租金</span>
              <span class="summary-value rent-value" id="rent"></span>
            </div>
            <div class="summary-item">
              <span class="summary-label" data-i18n="vacancy_label">空房期間</span>
              <span class="summary-value" id="vacancy"></span>
            </div>
          </div>
        </div>
      </div>

      <!-- Discount notice -->
      <div class="discount-notice" id="discount">
        簽約一年以上享有折扣，幅度面議
      </div>

      <!-- Detail card -->
      <div class="card">
        <div class="detail-section">
          <div class="detail-item">
            <div class="detail-label" data-i18n="address_label">地址</div>
            <div class="detail-value" id="address"></div>
          </div>
          <div class="detail-item">
            <div class="detail-label" data-i18n="size_label">坪數</div>
            <div class="detail-value" id="size"></div>
          </div>
          <div class="detail-item" id="equipment-section" style="display:none;">
            <div class="detail-label" data-i18n="equipment_label">設備</div>
            <div class="equipment-grid" id="equipment"></div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- Sticky footer CTA -->
  <div class="sticky-footer" id="footer">
    <a class="cta-button cta-line" id="line-btn" href="#" target="_blank" rel="noopener">
      <svg class="cta-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M19.365 9.863c.349 0 .63.285.63.631 0 .345-.281.63-.63.63H17.61v1.125h1.755c.349 0 .63.283.63.63 0 .344-.281.629-.63.629h-2.386c-.345 0-.627-.285-.627-.629V8.108c0-.345.282-.63.627-.63h2.386c.349 0 .63.285.63.63 0 .349-.281.63-.63.63H17.61v1.125h1.755zm-3.855 3.016c0 .27-.174.51-.432.596-.064.021-.133.031-.199.031-.211 0-.391-.09-.51-.25l-2.443-3.317v2.94c0 .344-.279.629-.631.629-.346 0-.626-.285-.626-.629V8.108c0-.27.173-.51.43-.595.06-.023.136-.033.194-.033.195 0 .375.104.495.254l2.462 3.33V8.108c0-.345.282-.63.63-.63.345 0 .63.285.63.63v4.771zm-5.741 0c0 .344-.282.629-.631.629-.345 0-.627-.285-.627-.629V8.108c0-.345.282-.63.627-.63.349 0 .631.285.631.63v4.771zm-2.466.629H4.917c-.345 0-.63-.285-.63-.629V8.108c0-.345.285-.63.63-.63.348 0 .63.285.63.63v4.141h1.756c.348 0 .629.283.629.63 0 .344-.281.629-.629.629M24 10.314C24 4.943 18.615.572 12 .572S0 4.943 0 10.314c0 4.811 4.27 8.842 10.035 9.608.391.082.923.258 1.058.59.12.301.079.766.038 1.08l-.164 1.02c-.045.301-.24 1.186 1.049.645 1.291-.539 6.916-4.078 9.436-6.975C23.176 14.393 24 12.458 24 10.314"/></svg>
      LINE
    </a>
    <a class="cta-button cta-whatsapp" id="whatsapp-btn" href="#" target="_blank" rel="noopener">
      <svg class="cta-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
      WhatsApp
    </a>
  </div>

  <script>
    // ===========================================
    // config — agent fills in these values
    // ===========================================
    const config = {
      SHEET_CSV_URL: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSBSLDaVfrnYpC6BerthV3T-cwuGETPsAKZm983sKsThfZUzp4wnz-e8nGkzu3Z7j4opmjODFUEDqL3/pub?gid=168737115&single=true&output=csv', // Replace with published Google Sheet CSV URL
      LINE_ID: 'hungmingtsai',  // Replace with your LINE ID
      PHONE_NUMBER: '886920085183', // Replace with your phone number (e.g., 886912345678)
    };

    // ===========================================
    // CSV Parser
    // ===========================================
    function parseCSV(csvText) {
      const lines = csvText.trim().split('\n');
      if (lines.length < 2) return [];

      const headers = parseCSVLine(lines[0]);
      const rows = [];

      for (let i = 1; i < lines.length; i++) {
        const values = parseCSVLine(lines[i]);
        const row = {};
        headers.forEach((header, index) => {
          row[header.trim()] = (values[index] || '').trim();
        });
        rows.push(row);
      }

      return rows;
    }

    function parseCSVLine(line) {
      const result = [];
      let current = '';
      let inQuotes = false;

      for (let i = 0; i < line.length; i++) {
        const char = line[i];

        if (inQuotes) {
          if (char === '"') {
            if (i + 1 < line.length && line[i + 1] === '"') {
              current += '"';
              i++; // skip escaped quote
            } else {
              inQuotes = false;
            }
          } else {
            current += char;
          }
        } else {
          if (char === '"') {
            inQuotes = true;
          } else if (char === ',') {
            result.push(current);
            current = '';
          } else {
            current += char;
          }
        }
      }

      result.push(current);
      return result;
    }

    // ===========================================
    // Core Functions
    // ===========================================
    function parseQueryParams() {
      const params = new URLSearchParams(window.location.search);
      return {
        id: params.get('id'),
        lang: params.get('lang') || 'zh',
      };
    }

    async function fetchSheetCSV(url) {
      const response = await fetch(url);
      if (!response.ok) {
        throw new Error('Failed to fetch data');
      }
      const csvText = await response.text();
      return parseCSV(csvText);
    }

    function formatRent(rent) {
      const num = parseInt(rent, 10);
      if (isNaN(num)) return rent;
      return 'NT$ ' + num.toLocaleString('en-US') + ' / 月';
    }

    function formatVacancy(start, end) {
      if (!start || !end) return '—';
      return start + ' ~ ' + end;
    }

    // ===========================================
    // i18n
    // ===========================================
    const I18N = {
      zh: {
        title: '房源資訊',
        rent_label: '月租金',
        rent_unit: '/ 月',
        vacancy_label: '空房期間',
        discount: '簽約一年以上享有折扣，幅度面議',
        address_label: '地址',
        size_label: '坪數',
        size_unit: '坪',
        equipment_label: '設備',
        toggle_text: 'EN',
        loading: '載入中...',
        not_found_title: '找不到此房源',
        not_found_msg: '請確認連結是否正確，或聯繫業務取得新連結。',
        no_id_title: '缺少房源編號',
        no_id_msg: '請使用業務提供的完整連結。',
        load_fail_title: '載入失敗',
        load_fail_msg: '請稍後再試，或聯繫業務。',
        photo_alt: '房源照片',
      },
      en: {
        title: 'Property Info',
        rent_label: 'Monthly Rent',
        rent_unit: '/ mo',
        vacancy_label: 'Vacancy',
        discount: 'Lease over 1 year eligible for discount, details negotiable',
        address_label: 'Address',
        size_label: 'Size',
        size_unit: 'ping',
        equipment_label: 'Amenities',
        toggle_text: '中文',
        loading: 'Loading...',
        not_found_title: 'Property Not Found',
        not_found_msg: 'Please check the link or contact the agent.',
        no_id_title: 'Missing Property ID',
        no_id_msg: 'Please use the full link provided by the agent.',
        load_fail_title: 'Failed to Load',
        load_fail_msg: 'Please try again later or contact the agent.',
        photo_alt: 'Property photo',
      },
    };

    let currentLang = 'zh';

    function t(key) {
      return I18N[currentLang][key] || I18N['zh'][key] || key;
    }

    // ===========================================
    // Equipment labels (extensible)
    // ===========================================
    const EQUIP_LABELS = {
      equip_ac:           { icon: '\u2744\uFE0F', zh: '冷氣', en: 'A/C' },
      equip_washer:       { icon: '\uD83E\uDDFA', zh: '洗衣機', en: 'Washer' },
      equip_fridge:       { icon: '\uD83E\uDDCA', zh: '冰箱', en: 'Fridge' },
      equip_internet:     { icon: '\uD83D\uDCF6', zh: '網路', en: 'Internet' },
      equip_water_heater: { icon: '\uD83D\uDEB0', zh: '熱水器', en: 'Water Heater' },
      equip_desk:         { icon: '\uD83D\uDCDD', zh: '書桌', en: 'Desk' },
      equip_wardrobe:     { icon: '\uD83D\uDEAA', zh: '衣櫃', en: 'Wardrobe' },
    };

    function getEquipLabel(key) {
      const entry = EQUIP_LABELS[key];
      if (entry) return { icon: entry.icon, text: entry[currentLang] || entry.zh };
      // Auto-generate label for unknown equip_* columns
      const name = key.replace('equip_', '').replace(/_/g, ' ');
      return { icon: '\u2705', text: name };
    }

    // ===========================================
    // Photo Carousel
    // ===========================================
    function renderCarousel(row) {
      const photos = [];
      for (let i = 1; i <= 5; i++) {
        const url = row['photo_' + i];
        if (url) photos.push(url);
      }

      const carousel = document.getElementById('carousel');
      if (photos.length === 0) {
        carousel.parentElement.style.display = 'none';
        return;
      }

      const track = document.getElementById('carousel-track');
      const dotsContainer = document.getElementById('carousel-dots');

      // Build slides
      photos.forEach((url, i) => {
        const slide = document.createElement('div');
        slide.className = 'carousel-slide';
        const img = document.createElement('img');
        img.src = url;
        img.alt = '房源照片 ' + (i + 1);
        img.loading = i === 0 ? 'eager' : 'lazy';
        slide.appendChild(img);
        track.appendChild(slide);

        const dot = document.createElement('button');
        dot.className = 'carousel-dot' + (i === 0 ? ' active' : '');
        dot.setAttribute('aria-label', '照片 ' + (i + 1));
        dotsContainer.appendChild(dot);
      });

      // Hide nav if only 1 photo
      if (photos.length <= 1) {
        document.getElementById('carousel-prev').style.display = 'none';
        document.getElementById('carousel-next').style.display = 'none';
        dotsContainer.style.display = 'none';
        return;
      }

      let current = 0;
      const dots = dotsContainer.querySelectorAll('.carousel-dot');

      function goTo(index) {
        if (index < 0) index = photos.length - 1;
        if (index >= photos.length) index = 0;
        current = index;
        track.style.transform = 'translateX(-' + (current * 100) + '%)';
        dots.forEach((d, i) => d.classList.toggle('active', i === current));
      }

      document.getElementById('carousel-prev').addEventListener('click', () => goTo(current - 1));
      document.getElementById('carousel-next').addEventListener('click', () => goTo(current + 1));
      dots.forEach((dot, i) => dot.addEventListener('click', () => goTo(i)));

      // Touch swipe support
      let touchStartX = 0;
      let touchEndX = 0;
      carousel.addEventListener('touchstart', (e) => { touchStartX = e.changedTouches[0].screenX; }, { passive: true });
      carousel.addEventListener('touchend', (e) => {
        touchEndX = e.changedTouches[0].screenX;
        const diff = touchStartX - touchEndX;
        if (Math.abs(diff) > 50) {
          goTo(diff > 0 ? current + 1 : current - 1);
        }
      }, { passive: true });
    }

    // ===========================================
    // Equipment Checklist
    // ===========================================
    function renderEquipment(row) {
      const container = document.getElementById('equipment');
      container.innerHTML = '';
      const section = document.getElementById('equipment-section');
      let hasEquipment = false;

      // Scan all equip_* keys
      Object.keys(row).forEach(key => {
        if (!key.startsWith('equip_')) return;
        const val = row[key].toUpperCase();
        if (val !== 'TRUE') return;

        hasEquipment = true;
        const label = getEquipLabel(key);
        const tag = document.createElement('span');
        tag.className = 'equipment-tag';
        tag.innerHTML = '<span class="equipment-icon">' + label.icon + '</span>' + label.text;
        container.appendChild(tag);
      });

      if (hasEquipment) {
        section.style.display = '';
      }
    }

    // ===========================================
    // Render Property
    // ===========================================
    let currentRow = null;
    let carouselRendered = false;

    function renderProperty(row) {
      currentRow = row;

      // Photos (only once — carousel doesn't change with language)
      if (!carouselRendered) {
        renderCarousel(row);
        carouselRendered = true;
      }

      // Update page title
      document.title = t('title');
      document.documentElement.lang = currentLang === 'zh' ? 'zh-Hant' : 'en';

      // Language toggle button text
      document.getElementById('lang-toggle').textContent = t('toggle_text');

      // Summary labels
      document.querySelector('[data-i18n="rent_label"]').textContent = t('rent_label');
      document.querySelector('[data-i18n="vacancy_label"]').textContent = t('vacancy_label');

      // Summary values
      const rentNum = parseInt(row.rent, 10);
      document.getElementById('rent').textContent = isNaN(rentNum) ? row.rent :
        'NT$ ' + rentNum.toLocaleString('en-US') + ' ' + t('rent_unit');
      document.getElementById('vacancy').textContent = formatVacancy(row.vacancy_start, row.vacancy_end);

      // Discount
      document.getElementById('discount').textContent = t('discount');

      // Detail labels
      document.querySelector('[data-i18n="address_label"]').textContent = t('address_label');
      document.querySelector('[data-i18n="size_label"]').textContent = t('size_label');

      // Detail values — pick _zh or _en column
      const addressKey = 'address_' + currentLang;
      document.getElementById('address').textContent = row[addressKey] || row.address_zh || '';
      document.getElementById('size').textContent = (row.size_ping || '—') + ' ' + t('size_unit');

      // Equipment label + re-render tags with current language
      document.querySelector('[data-i18n="equipment_label"]').textContent = t('equipment_label');
      renderEquipment(row);

      // Set CTA links
      document.getElementById('line-btn').href = 'https://line.me/ti/p/~' + config.LINE_ID;
      document.getElementById('whatsapp-btn').href = 'https://wa.me/' + config.PHONE_NUMBER;

      // Show content
      document.getElementById('property').classList.add('visible');
      document.getElementById('footer').classList.add('visible');
    }

    function showError(titleKey, msgKey) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('error').querySelector('.error-title').textContent = t(titleKey);
      document.getElementById('error').querySelector('.error-message').textContent = t(msgKey);
      document.getElementById('error').classList.add('visible');
    }

    function handleNotFound() {
      showError('not_found_title', 'not_found_msg');
    }

    // ===========================================
    // Language Toggle
    // ===========================================
    function switchLanguage() {
      currentLang = currentLang === 'zh' ? 'en' : 'zh';
      // Update URL without reload
      const params = new URLSearchParams(window.location.search);
      params.set('lang', currentLang);
      history.replaceState(null, '', '?' + params.toString());
      // Re-render
      if (currentRow) {
        renderProperty(currentRow);
      }
    }

    // ===========================================
    // Main
    // ===========================================
    async function main() {
      const { id, lang } = parseQueryParams();
      currentLang = (lang === 'en') ? 'en' : 'zh';

      if (!id) {
        showError('no_id_title', 'no_id_msg');
        return;
      }

      try {
        const data = await fetchSheetCSV(config.SHEET_CSV_URL);
        const row = data.find(r => r.id === id);

        document.getElementById('loading').classList.add('hidden');

        if (!row) {
          handleNotFound();
          return;
        }

        renderProperty(row);

        // Bind language toggle after render
        document.getElementById('lang-toggle').addEventListener('click', switchLanguage);
      } catch (err) {
        showError('load_fail_title', 'load_fail_msg');
      }
    }

    main();
  </script>

</body>
</html>
